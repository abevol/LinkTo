name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: LinkTo/LinkTo.csproj
  PUBLISH_DIR: LinkTo/bin/Release/win-x64/publish

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish with win-x64 profile
        run: dotnet publish ${{ env.PROJECT_PATH }} /p:PublishProfile=win-x64

      - name: Remove PDB files
        run: |
          Get-ChildItem -Path "${{ env.PUBLISH_DIR }}" -Filter "*.pdb" -Recurse | Remove-Item -Force
        shell: pwsh

      - name: Get version from tag
        id: get_version
        run: |
          $version = "${{ github.ref_name }}"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"
        shell: pwsh

      - name: Create release archive
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          Compress-Archive -Path "${{ env.PUBLISH_DIR }}/*" -DestinationPath "LinkTo-$version-win-x64.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LinkTo ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## LinkTo ${{ steps.get_version.outputs.VERSION }}
            
            ### Requirements
            - Windows 10 version 1809 (build 17763) or later
            - [Windows App SDK Runtime](https://learn.microsoft.com/windows/apps/windows-app-sdk/downloads)
            
            ### Installation
            1. Download and extract the zip file
            2. Run `LinkTo.exe`
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            LinkTo-${{ steps.get_version.outputs.VERSION }}-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
